<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyMoney — บันทึกรายรับรายจ่าย</title>
    <meta name="description" content="แอปบันทึกรายรับรายจ่ายส่วนตัว ไม่มีโฆษณา เก็บข้อมูลในเครื่อง">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0A0F1E">
</head>
<body>
<div class="app-shell">

    <!-- ===== TOP CARD ===== -->
    <header class="top-card">
        <div class="top-card-header">
            <div>
                <p class="app-name">MyMoney</p>
                <h2 id="total-balance" class="big-balance">฿0.00</h2>
                <p class="balance-sub">ยอดรวมทั้งหมด</p>
            </div>
            <button id="btn-add" class="btn-add-top" title="เพิ่มรายการ">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>

        <div class="period-summary">
            <div class="period-item income-item">
                <span class="period-icon">↑</span>
                <div>
                    <p class="period-label" id="label-income">รายรับ</p>
                    <p class="period-amount income-color" id="total-income">฿0.00</p>
                </div>
            </div>
            <div class="period-divider"></div>
            <div class="period-item expense-item">
                <span class="period-icon">↓</span>
                <div>
                    <p class="period-label" id="label-expense">รายจ่าย</p>
                    <p class="period-amount expense-color" id="total-expense">฿0.00</p>
                </div>
            </div>
        </div>

        <!-- Filter Row -->
        <div class="filter-row">
            <div class="filter-tabs" id="filter-tabs">
                <button class="filter-tab" data-mode="all">ทั้งหมด</button>
                <button class="filter-tab" data-mode="monthly" id="tab-monthly">เดือนนี้</button>
                <button class="filter-tab" data-mode="daily">วันนี้</button>
                <button class="filter-tab" data-mode="yearly">รายปี</button>
            </div>
            <div class="filter-date-inputs">
                <input type="date" id="filter-daily" class="date-input hidden">
                <input type="month" id="filter-monthly" class="date-input hidden">
                <select id="filter-yearly" class="date-input hidden"></select>
            </div>
        </div>
    </header>

    <!-- ===== TRANSACTIONS LIST ===== -->
    <main class="list-section">
        <div id="tx-list"></div>

        <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon-wrap">
                <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <p id="empty-text">ไม่มีรายการ</p>
            <span id="empty-sub">กดปุ่ม + เพื่อเริ่มบันทึก</span>
        </div>
    </main>

    <!-- ===== BOTTOM NAV ===== -->
    <div class="bottom-bar">
        <button id="btn-fab" class="fab-center">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </div>

</div>

<!-- ===== ADD TRANSACTION MODAL ===== -->
<div id="modal-transaction" class="modal-overlay">
    <div class="modal-sheet slider-up">
        <div class="modal-drag-bar"></div>
        <div class="modal-inner">
            <div class="modal-topbar">
                <h3>รายการใหม่</h3>
                <button class="btn-modal-close" id="btn-close-transaction">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form id="form-transaction">
                <!-- Type Tabs -->
                <div class="type-toggle">
                    <input type="radio" id="type-expense" name="tx-type" value="expense" checked>
                    <label for="type-expense">รายจ่าย</label>
                    <input type="radio" id="type-income" name="tx-type" value="income">
                    <label for="type-income">รายรับ</label>
                </div>

                <!-- Amount -->
                <div class="amount-display">
                    <span class="amount-currency">฿</span>
                    <input type="number" id="input-amount" placeholder="0.00" step="0.01" required inputmode="decimal">
                </div>

                <div class="form-fields">
                    <div class="field-row">
                        <label>ชื่อรายการ</label>
                        <input type="text" id="input-title" placeholder="เช่น ค่าอาหารกลางวัน" required class="field-input">
                    </div>
                    <div class="field-row">
                        <label>วันที่</label>
                        <input type="date" id="input-date" required class="field-input">
                    </div>
                    <div class="field-row">
                        <label>หมวดหมู่</label>
                        <div class="field-with-btn">
                            <select id="select-category" class="field-input"></select>
                            <button type="button" id="btn-add-category-modal" class="btn-add-cat">
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="submit" id="btn-submit-tx" class="btn-save expense-btn">บันทึกรายจ่าย</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== ADD CATEGORY MODAL ===== -->
<div id="modal-category" class="modal-overlay">
    <div class="modal-sheet scale-up">
        <div class="modal-inner">
            <div class="modal-topbar">
                <h3>เพิ่มหมวดหมู่</h3>
                <button class="btn-modal-close" id="btn-close-category">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="form-category">
                <div class="field-row">
                    <label>ชื่อหมวดหมู่ใหม่</label>
                    <input type="text" id="input-new-category" placeholder="เช่น ค่าเดินทาง" required class="field-input">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-save neutral-btn">เพิ่มหมวดหมู่</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
