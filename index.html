<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกรายรับรายจ่าย</title>
    <!-- SEO Best Practices -->
    <meta name="description" content="แอปพลิเคชันบันทึกรายรับรายจ่ายแบบไม่มีโฆษณา บันทึกข้อมูลในเครื่อง ใช้งานง่าย">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <div class="app-container">
        <!-- Header & Summary Card -->
        <header class="header">
            <div class="header-title">
                <h1>บัญชีของฉัน</h1>
                <p id="current-date">วันนี้</p>
            </div>
            
            <div class="balance-card glass-panel">
                <p class="balance-label">ยอดเงินคงเหลือ</p>
                <h2 id="total-balance">฿0.00</h2>
                <div class="balance-details">
                    <div class="income-summary">
                        <div class="icon-circle icon-income">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        </div>
                        <div>
                            <p>รายรับ</p>
                            <h3 id="total-income">฿0.00</h3>
                        </div>
                    </div>
                    <div class="expense-summary">
                        <div class="icon-circle icon-expense">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                        </div>
                        <div>
                            <p>รายจ่าย</p>
                            <h3 id="total-expense">฿0.00</h3>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Transactions List -->
        <main class="transactions-section">
            <div class="section-header">
                <h3>รายการล่าสุด</h3>
                <div class="header-actions">
                    <input type="date" id="filter-date" class="date-filter">
                    <button id="btn-clear-filter" class="btn-text hidden">ดูทั้งหมด</button>
                    <button id="btn-clear-data" class="btn-text">ล้างข้อมูล</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="tx-table">
                    <thead>
                        <tr>
                            <th width="40"></th>
                            <th>รายการ</th>
                            <th class="text-right">รายรับ</th>
                            <th class="text-right">รายจ่าย</th>
                            <th class="text-right">คงเหลือ</th>
                            <th>ประเภท</th>
                            <th width="40">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-list">
                        <!-- Transactions will be rendered here -->
                    </tbody>
                </table>
            </div>
            <div id="empty-state" class="empty-state hidden">
                <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <p>ยังไม่มีรายการ เริ่มต้นบันทึกเลย!</p>
            </div>
        </main>

        <!-- Floating Action Button -->
        <button id="btn-fab" class="fab">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>

        <!-- Add Transaction Modal -->
        <div id="modal-transaction" class="modal-overlay">
            <div class="modal-content slider-up">
                <div class="modal-header">
                    <h2>เพิ่มรายการใหม่</h2>
                    <button class="btn-close" id="btn-close-transaction">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <form id="form-transaction">
                    <div class="type-selector">
                        <input type="radio" id="type-income" name="tx-type" value="income">
                        <label for="type-income" class="type-btn">รายรับ</label>
                        <input type="radio" id="type-expense" name="tx-type" value="expense" checked>
                        <label for="type-expense" class="type-btn">รายจ่าย</label>
                    </div>

                    <div class="form-group">
                        <label for="input-date">วันที่ทำรายการ</label>
                        <input type="date" id="input-date" required>
                    </div>

                    <div class="form-group">
                        <label for="input-amount">จำนวนเงิน</label>
                        <input type="number" id="input-amount" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="input-title">ชื่อรายการ</label>
                        <input type="text" id="input-title" placeholder="เช่น เงินเดือน, ค่าอาหารเช้า" required>
                    </div>

                    <div class="form-group">
                        <label for="select-category">หมวดหมู่</label>
                        <div class="category-wrapper">
                            <select id="select-category" required>
                                <!-- Categories populated via JS -->
                            </select>
                            <button type="button" id="btn-add-category-modal" class="btn-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">บันทึกรายการ</button>
                </form>
            </div>
        </div>

        <!-- Add Category Modal -->
        <div id="modal-category" class="modal-overlay">
            <div class="modal-content scale-up">
                <div class="modal-header">
                    <h2>เพิ่มหมวดหมู่ใหม่</h2>
                    <button class="btn-close" id="btn-close-category">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <form id="form-category">
                    <div class="form-group">
                        <label for="input-new-category">ชื่อหมวดหมู่</label>
                        <input type="text" id="input-new-category" placeholder="ตัวอย่าง: ค่าเดินทาง, ช้อปปิ้ง" required>
                    </div>
                    <button type="submit" class="btn-primary">เพิ่มเข้าสู่ระบบ</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
