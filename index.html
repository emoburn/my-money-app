<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกรายรับรายจ่าย</title>
    <!-- SEO Best Practices -->
    <meta name="description" content="แอปพลิเคชันบันทึกรายรับรายจ่ายแบบไม่มีโฆษณา บันทึกข้อมูลในเครื่อง ใช้งานง่าย">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <div class="app-container">
        <!-- Header & Summary Card -->
        <header class="header">
            <div class="header-title">
                <h1>บัญชีของฉัน</h1>
            </div>
            
            <div class="balance-card glass-panel" id="card-balance">
                <div class="balance-main">
                    <p class="balance-label">ยอดเงินคงเหลือรวม (ทั้งหมด)</p>
                    <h2 id="total-balance">฿0.00</h2>
                </div>
                
                <div class="filter-section">
                    <div class="filter-controls">
                        <select id="filter-type" class="sleek-input">
                            <option value="all">รวมทุกช่วงเวลา</option>
                            <option value="daily">รายวัน</option>
                            <option value="monthly" selected>รายเดือน</option>
                            <option value="yearly">รายปี</option>
                        </select>
                        <input type="date" id="filter-daily" class="sleek-input hidden">
                        <input type="month" id="filter-monthly" class="sleek-input">
                        <select id="filter-yearly" class="sleek-input hidden">
                            <!-- Populated by JS -->
                        </select>
                        <button id="btn-clear-data" class="btn-text-danger" title="ล้างข้อมูลทั้งหมด" style="margin-left: auto;">
                            <!-- Trash Icon -->
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="balance-details">
                    <div class="income-summary">
                        <div class="icon-circle icon-income">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        </div>
                        <div>
                            <p class="dynamic-label" id="label-income">รายรับ</p>
                            <h3 id="total-income">฿0.00</h3>
                        </div>
                    </div>
                    <div class="expense-summary">
                        <div class="icon-circle icon-expense">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                        </div>
                        <div>
                            <p class="dynamic-label" id="label-expense">รายจ่าย</p>
                            <h3 id="total-expense">฿0.00</h3>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Transactions List -->
        <main class="transactions-section">
            <h3 class="section-title">รายการบันทึก (ตามช่วงเวลา)</h3>
            
            <div class="table-responsive">
                <table class="tx-table">
                    <thead>
                        <tr>
                            <th width="32"></th>
                            <th>รายการ</th>
                            <th class="text-right">รายรับ</th>
                            <th class="text-right">รายจ่าย</th>
                            <th class="text-right">คงเหลือ</th>
                            <th class="text-center">ประเภท</th>
                            <th width="32"></th>
                        </tr>
                    </thead>
                    <tbody id="transactions-list">
                        <!-- Transactions will be rendered here -->
                    </tbody>
                </table>
            </div>
            
            <div id="empty-state" class="empty-state hidden">
                <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" class="empty-icon"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <p id="empty-text">ยังไม่มีรายการในเวลานี้ เริ่มต้นบันทึกเลย!</p>
            </div>
        </main>

        <!-- Floating Action Button -->
        <button id="btn-fab" class="fab">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>

        <!-- Add Transaction Modal -->
        <div id="modal-transaction" class="modal-overlay">
            <div class="modal-content slider-up">
                <div class="modal-header">
                    <h2>เพิ่มรายการใหม่</h2>
                    <button class="btn-close" id="btn-close-transaction">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <form id="form-transaction">
                    <div class="type-selector">
                        <input type="radio" id="type-income" name="tx-type" value="income">
                        <label for="type-income" class="type-btn">รายรับ</label>
                        <input type="radio" id="type-expense" name="tx-type" value="expense" checked>
                        <label for="type-expense" class="type-btn">รายจ่าย</label>
                    </div>

                    <div class="form-group">
                        <label for="input-date">วันที่ทำรายการ</label>
                        <input type="date" id="input-date" required class="input-modern">
                    </div>

                    <div class="form-group">
                        <label for="input-amount">จำนวนเงิน (บาท)</label>
                        <input type="number" id="input-amount" placeholder="0.00" step="0.01" required class="input-modern amount-input">
                    </div>

                    <div class="form-group">
                        <label for="input-title">ชื่อรายการ</label>
                        <input type="text" id="input-title" placeholder="เช่น เงินเดือน, ค่าอาหาร, ค่ารถ" required class="input-modern">
                    </div>

                    <div class="form-group">
                        <label for="select-category">หมวดหมู่</label>
                        <div class="category-wrapper">
                            <select id="select-category" required class="input-modern">
                                <!-- Categories populated via JS -->
                            </select>
                            <button type="button" id="btn-add-category-modal" class="btn-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">บันทึกรายการ</button>
                </form>
            </div>
        </div>

        <!-- Add Category Modal -->
        <div id="modal-category" class="modal-overlay">
            <div class="modal-content scale-up">
                <div class="modal-header">
                    <h2>เพิ่มหมวดหมู่ใหม่</h2>
                    <button class="btn-close" id="btn-close-category">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <form id="form-category">
                    <div class="form-group">
                        <label for="input-new-category">ชื่อหมวดหมู่</label>
                        <input type="text" id="input-new-category" placeholder="ตัวอย่าง: ช้อปปิ้ง, ของกินเล่น" required class="input-modern">
                    </div>
                    <button type="submit" class="btn-primary">เพิ่มเข้าสู่ระบบ</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
