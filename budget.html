<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyMoney — คำนวณงบการเงิน</title>
    <meta name="description" content="วางแผนงบประมาณ สร้างหมวดหมู่ และคำนวณเปอร์เซ็นต์ของงบตั้งต้น">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="budget.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0A0F1E">
</head>
<body>
<div class="app-shell">

    <!-- ===== TOP CARD ===== -->
    <header class="top-card budget-top-card">
        <div class="budget-header-row">
            <a href="index.html" class="btn-back" id="btn-back" title="กลับหน้าหลัก">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <div class="budget-header-title">
                <p class="app-name">งบการเงิน</p>
                <h2 class="budget-page-title">Budget Planner</h2>
            </div>
            <button id="btn-reset-budget" class="btn-reset" title="รีเซ็ตงบ">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            </button>
        </div>

        <!-- Budget Setting -->
        <div class="budget-input-card">
            <label class="budget-input-label">งบประมาณตั้งต้น</label>
            <div class="budget-input-row">
                <span class="budget-currency">฿</span>
                <input type="number" id="input-total-budget" class="budget-amount-input" placeholder="0.00" step="0.01" inputmode="decimal">
                <button id="btn-set-budget" class="btn-set-budget">ตั้งงบ</button>
            </div>
        </div>

        <!-- Summary Chips -->
        <div class="budget-summary-row">
            <div class="budget-chip">
                <span class="budget-chip-label">งบตั้งต้น</span>
                <span class="budget-chip-value" id="display-total-budget">฿0.00</span>
            </div>
            <div class="budget-chip">
                <span class="budget-chip-label">ใช้ไปแล้ว</span>
                <span class="budget-chip-value spent-color" id="display-used-budget">฿0.00</span>
            </div>
            <div class="budget-chip">
                <span class="budget-chip-label">คงเหลือ</span>
                <span class="budget-chip-value remain-color" id="display-remain-budget">฿0.00</span>
            </div>
        </div>

        <!-- Overall Progress Bar -->
        <div class="overall-progress-wrap">
            <div class="overall-progress-bar">
                <div class="overall-progress-fill" id="overall-progress-fill"></div>
            </div>
            <span class="overall-progress-pct" id="overall-progress-pct">0%</span>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="budget-main">

        <!-- Add Category Button -->
        <div class="section-header">
            <h3 class="section-title">หมวดหมู่งบประมาณ</h3>
            <button id="btn-add-cat-budget" class="btn-add-cat-budget">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                เพิ่มหมวดหมู่
            </button>
        </div>

        <!-- Categories List -->
        <div id="budget-categories-list"></div>

        <!-- Empty State -->
        <div id="budget-empty" class="empty-state hidden">
            <div class="empty-icon-wrap">
                <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="1.5" fill="none"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div>
            <p>ยังไม่มีหมวดหมู่</p>
            <span>กดปุ่ม "+ เพิ่มหมวดหมู่" เพื่อเริ่มต้น</span>
        </div>

    </main>

</div>

<!-- ===== MODAL: ADD CATEGORY ===== -->
<div id="modal-add-cat" class="modal-overlay">
    <div class="modal-sheet scale-up">
        <div class="modal-inner">
            <div class="modal-topbar">
                <h3 id="modal-cat-title">เพิ่มหมวดหมู่</h3>
                <button class="btn-modal-close" id="btn-close-add-cat">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="form-add-cat">
                <div class="field-row" style="margin-bottom:16px;">
                    <label>ชื่อหมวดหมู่</label>
                    <input type="text" id="input-cat-name" class="field-input" placeholder="เช่น ค่าวัสดุ, ค่าแรง" required>
                </div>
                <div class="field-row" style="margin-bottom:16px;">
                    <label>ไอคอน (optional)</label>
                    <div class="emoji-picker" id="emoji-picker">
                        <button type="button" class="emoji-opt selected" data-emoji="📦">📦</button>
                        <button type="button" class="emoji-opt" data-emoji="🏗️">🏗️</button>
                        <button type="button" class="emoji-opt" data-emoji="💡">💡</button>
                        <button type="button" class="emoji-opt" data-emoji="🔧">🔧</button>
                        <button type="button" class="emoji-opt" data-emoji="🚚">🚚</button>
                        <button type="button" class="emoji-opt" data-emoji="👷">👷</button>
                        <button type="button" class="emoji-opt" data-emoji="🏢">🏢</button>
                        <button type="button" class="emoji-opt" data-emoji="📊">📊</button>
                        <button type="button" class="emoji-opt" data-emoji="💰">💰</button>
                        <button type="button" class="emoji-opt" data-emoji="🎯">🎯</button>
                        <button type="button" class="emoji-opt" data-emoji="🛒">🛒</button>
                        <button type="button" class="emoji-opt" data-emoji="✈️">✈️</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-save neutral-btn" id="btn-submit-cat">เพิ่มหมวดหมู่</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== MODAL: ADD ITEM ===== -->
<div id="modal-add-item" class="modal-overlay">
    <div class="modal-sheet slider-up">
        <div class="modal-drag-bar"></div>
        <div class="modal-inner">
            <div class="modal-topbar">
                <h3>เพิ่มรายการ</h3>
                <button class="btn-modal-close" id="btn-close-add-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="item-modal-cat-badge" id="item-modal-cat-badge">📦 หมวดหมู่</div>
            <form id="form-add-item">
                <div class="amount-display" style="margin-bottom:20px;">
                    <span class="amount-currency">฿</span>
                    <input type="number" id="input-item-amount" placeholder="0.00" step="0.01" required inputmode="decimal">
                </div>
                <div class="form-fields">
                    <div class="field-row">
                        <label>รายละเอียด</label>
                        <input type="text" id="input-item-name" class="field-input" placeholder="เช่น ค่าอิฐ 1,000 ก้อน" required>
                    </div>
                    <div class="field-row">
                        <label>หมายเหตุ (optional)</label>
                        <input type="text" id="input-item-note" class="field-input" placeholder="บันทึกเพิ่มเติม">
                    </div>
                </div>
                <input type="hidden" id="input-item-cat-id">
                <div class="modal-actions">
                    <button type="submit" class="btn-save neutral-btn">บันทึกรายการ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== MODAL: CONFIRM DELETE ===== -->
<div id="modal-confirm" class="modal-overlay">
    <div class="modal-sheet scale-up">
        <div class="modal-inner">
            <div class="confirm-icon">⚠️</div>
            <h3 class="confirm-title" id="confirm-title">ยืนยันการลบ?</h3>
            <p class="confirm-desc" id="confirm-desc">การกระทำนี้ไม่สามารถย้อนกลับได้</p>
            <div class="confirm-actions">
                <button id="btn-confirm-cancel" class="btn-confirm-cancel">ยกเลิก</button>
                <button id="btn-confirm-ok" class="btn-confirm-ok">ลบ</button>
            </div>
        </div>
    </div>
</div>

<script src="budget.js"></script>
</body>
</html>
